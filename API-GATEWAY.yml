server:
  port: 8091

spring:
  application:
    name: API-GATEWAY

  cloud:
    gateway:
      routes:
        - id: PRODUCT-SERVICE
          uri: http://localhost:8081
          predicates:
            - Path=/product/**

        - id: USER-SERVICE
          uri: http://localhost:8082
          predicates:
            - Path=/user/**

        - id: ORDER-SERVICE
          uri: http://localhost:8083
          predicates:
            - Path=/order/**
